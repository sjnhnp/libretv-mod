<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="看看讲究将就看看">
    <title>播放器</title>

    <!-- 外部样式表 -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Vidstack Player plyr官方样式 -->
    <!--<link rel="stylesheet" href="https://cdn.vidstack.io/player.css" />
    <link rel="stylesheet" href="https://cdn.vidstack.io/plyr.css" /> -->

    <!-- Vidstack Player default官方样式 -->
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/theme.css" />
    <link rel="stylesheet" href="https://cdn.vidstack.io/player/video.css" />

    <link rel="stylesheet" href="css/player_styles.css">

    <!-- 字体和图标 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- 环境变量注入 -->
    <script>window.__ENV__ = window.__ENV__ || {}; window.__ENV__.PASSWORD = "{{PASSWORD}}";</script>

    <!-- 外部库 -->
    <script src="libs/tailwindcss.min.js"></script>
    <script src="libs/sha256.min.js" defer></script>

    <!-- 应用脚本 (defer) -->
    <script src="js/config.js" defer></script>
    <script src="js/password.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/api_source_manager.js" defer></script>
    <script src="js/player_preload.js" defer></script>
    <script src="js/ui.js" defer></script>
</head>

<body class="bg-black text-white font-sans min-h-screen elegant-body">
    <div class="player-container relative elegant-container">

        <!-- 顶部导航栏 - 保持原有结构 -->
        <header class="flex items-center justify-between p-4 elegant-header">
            <button id="back-button"
                class="flex items-center gap-2 text-white hover:text-blue-400 transition-colors elegant-back-button"
                aria-label="返回">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-arrow-left" aria-hidden="true">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span class="font-semibold">返回</span>
            </button>
            <div class="flex items-center ml-auto elegant-header-actions">
                <button id="fullscreen-button"
                    class="text-white hover:text-blue-400 allow-when-locked transition-colors elegant-fullscreen-button"
                    aria-label="全屏">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="feather feather-maximize" aria-hidden="true">
                        <path
                            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3">
                        </path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 播放器区域 - 保持原有结构 -->
        <div id="player-region" class="relative elegant-player-region" role="region" aria-label="视频播放区域">
            <!-- Vidstack 播放器将通过 JS 注入到这个 div -->
            <div id="player" class="w-full h-full elegant-player-wrapper"></div>

            <!-- 加载和错误覆盖层 - 保持原有结构 -->
            <div id="loading" class="loading-container hidden elegant-loading" aria-live="polite">
                <div class="loading-spinner elegant-spinner" aria-hidden="true"></div>
                <div class="mt-4 elegant-loading-text">加载中...</div>
            </div>
            <div id="error" class="error-container elegant-error" aria-live="assertive">
                <div class="error-icon elegant-error-icon" aria-hidden="true">⚠️</div>
                <div class="text-xl font-bold elegant-error-title">播放出错</div>
                <div class="mt-2 elegant-error-message">请尝试其他线路或刷新页面</div>
                <button id="retry-button"
                    class="mt-4 px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded transition-colors elegant-retry-button">重试</button>
            </div>

            <div id="toast"
                class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-0 px-6 py-3 rounded-lg shadow-lg transform transition-all duration-300 text-white z-[10001] pointer-events-none elegant-toast">
                <span id="toastMessage"></span>
            </div>
        </div>

        <!-- 播放控制和剧集信息 - 保持原有结构 -->
        <div class="flex items-center justify-between p-4 elegant-playback-controls">
            <button id="prev-episode"
                class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-lg flex items-center gap-2 transition-colors elegant-nav-button"
                aria-label="上一集">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-skip-back">
                    <polygon points="19 20 9 12 19 4 19 20"></polygon>
                    <line x1="5" y1="19" x2="5" y2="5"></line>
                </svg>
                <span>上一集</span>
            </button>
            <span id="episode-info-span" class="text-lg font-medium text-gray-300 elegant-episode-info"></span>
            <button id="next-episode"
                class="px-4 py-2 bg-gray-800 hover:bg-gray-700 text-gray-300 rounded-lg flex items-center gap-2 transition-colors elegant-nav-button"
                aria-label="下一集">
                <span>下一集</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="feather feather-skip-forward">
                    <polygon points="5 4 15 12 5 20 5 4"></polygon>
                    <line x1="19" y1="5" x2="19" y2="19"></line>
                </svg>
            </button>
        </div>

        <!-- 功能控制条 - 重新设计，移除自动播放和记住进度 -->
        <div class="p-4 bg-gray-900 rounded-lg mx-4 mb-4 elegant-function-bar">
            <div class="player-control-bar elegant-controls">

                <!-- 线路切换 - 保持原有逻辑 -->
                <div class="relative line-switch-container elegant-function-group">
                    <button id="line-switch-button"
                        class="icon-btn bg-gray-800 hover:bg-gray-700 text-gray-300 rounded transition-colors flex items-center gap-1 px-2 elegant-function-button"
                        aria-label="切换线路">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                        </svg>
                        <span class="text-sm">线路</span>
                    </button>
                    <div id="line-switch-dropdown" class="hidden elegant-dropdown elegant-solid-dropdown"></div>
                </div>

                <!-- 跳过控制 - 保持原有逻辑 -->
                <div class="relative skip-control-container elegant-function-group">
                    <button id="skip-control-button" title="跳过设置"
                        class="icon-btn bg-gray-800 hover:bg-gray-700 text-gray-300 rounded transition-colors elegant-function-button"
                        aria-label="跳过片头片尾">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 5l7 7-7 7M15 5l7 7-7 7" />
                        </svg>
                        <span class="text-sm hidden sm:inline">跳过</span>
                    </button>
                    <div id="skip-control-dropdown" class="hidden elegant-dropdown elegant-solid-dropdown">
                        <div class="elegant-dropdown-content">
                            <div class="flex items-center mb-2 elegant-input-group">
                                <label for="skip-intro-input"
                                    class="text-gray-300 text-sm mr-2 shrink-0 elegant-label">跳片头</label>
                                <input id="skip-intro-input" type="number" min="0" step="1" placeholder="秒"
                                    class="w-full bg-gray-800 text-gray-300 rounded p-1 text-sm elegant-input">
                            </div>
                            <div class="flex items-center mb-4 elegant-input-group">
                                <label for="skip-outro-input"
                                    class="text-gray-300 text-sm mr-2 shrink-0 elegant-label">跳片尾</label>
                                <input id="skip-outro-input" type="number" min="0" step="1" placeholder="秒"
                                    class="w-full bg-gray-800 text-gray-300 rounded p-1 text-sm elegant-input">
                            </div>
                            <button id="apply-skip-settings"
                                class="w-full text-white rounded p-2 mb-2 text-sm elegant-primary-button">应用</button>
                            <button id="reset-skip-settings"
                                class="w-full text-white rounded p-2 text-sm elegant-secondary-button">重置</button>
                        </div>
                    </div>
                </div>

                <!-- 原有的复制链接 -->
                <button id="copy-link-button" title="复制当前视频链接"
                    class="icon-btn bg-gray-800 hover:bg-gray-700 text-gray-300 rounded transition-colors elegant-function-button"
                    aria-label="复制链接">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                    </svg>
                    <span class="text-sm hidden sm:inline">复制</span>
                </button>

                <!-- 排序 - 保持原有逻辑 -->
                <button id="order-button"
                    class="icon-btn bg-gray-800 hover:bg-gray-700 text-gray-300 rounded transition-colors elegant-function-button"
                    aria-label="切换剧集顺序">
                    <svg id="order-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" style="transition: transform 0.3s ease;">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                    <span class="text-sm hidden sm:inline">排序</span>
                </button>

                <!-- 锁屏 - 保持原有逻辑 -->
                <button id="lock-button"
                    class="icon-btn bg-gray-800 hover:bg-gray-700 text-gray-300 rounded transition-colors elegant-function-button"
                    aria-label="锁定/解锁屏幕控制">
                    <svg id="lock-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <span class="text-sm hidden sm:inline">锁屏</span>
                </button>

                <!-- 播放设置 - 新增，包含自动播放和记住进度 -->
                <div class="relative player-settings-container elegant-function-group">
                    <button id="player-settings-button"
                        class="icon-btn bg-gray-800 hover:bg-gray-700 text-gray-300 rounded transition-colors elegant-function-button"
                        aria-label="播放设置">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                        <span class="text-sm hidden sm:inline">设置</span>
                    </button>
                    <div id="player-settings-dropdown" class="hidden elegant-dropdown elegant-solid-dropdown">
                        <div class="elegant-dropdown-content">
                            <div class="elegant-setting-group">
                                <label class="elegant-setting-title">播放控制</label>

                                <!-- 自动播放下一集 -->
                                <div class="elegant-setting-item">
                                    <span class="elegant-setting-label">自动播放下一集</span>
                                    <label class="elegant-switch">
                                        <input type="checkbox" id="autoplay-next" checked>
                                        <span class="elegant-switch-slider"></span>
                                    </label>
                                </div>

                                <!-- 记住播放进度 -->
                                <div class="elegant-setting-item">
                                    <span class="elegant-setting-label">记住播放进度</span>
                                    <label class="elegant-switch">
                                        <input type="checkbox" id="remember-episode-progress-toggle" checked>
                                        <span class="elegant-switch-slider"></span>
                                    </label>
                                </div>

                                <!-- 播放速度 -->
                                <div class="elegant-setting-item">
                                    <span class="elegant-setting-label">播放速度</span>
                                    <select id="playback-speed" class="elegant-select">
                                        <option value="0.5">0.5x</option>
                                        <option value="0.75">0.75x</option>
                                        <option value="1" selected>1.0x</option>
                                        <option value="1.25">1.25x</option>
                                        <option value="1.5">1.5x</option>
                                        <option value="2">2.0x</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 剧集选择 - 保持原有结构 -->
        <div id="episodes-container" class="mt-2 mx-4 mb-4 hidden elegant-episodes-container" role="navigation"
            aria-label="剧集选择">
            <div class="flex justify-between items-center mb-2 elegant-episodes-header">
                <h2 class="text-xl font-bold elegant-episodes-title">选集</h2>
                <span id="episodes-count" class="text-gray-400 elegant-episodes-count"></span>
            </div>
            <div id="episode-grid" class="elegant-episodes-grid"></div>
        </div>

        <!-- 快捷键和消息提示 - 保持原有结构 -->
        <div id="shortcut-hint" class="shortcut-hint elegant-shortcut-hint" aria-live="polite" aria-atomic="true">
            <span id="shortcut-key"></span>
            <span id="shortcut-action"></span>
        </div>
        <div id="message" class="fixed top-4 right-4 p-4 rounded shadow-lg z-50 hidden elegant-message"
            aria-live="polite"></div>

        <!-- 记住进度弹窗 - 保持原有结构 -->
        <div id="progress-restore-modal" tabindex="-1" aria-modal="true" role="dialog" style="display: none;"
            class="elegant-progress-modal">
            <div class="progress-restore-card elegant-progress-card" role="document">
                <div class="progress-modal-title elegant-progress-title">继续播放？</div>
                <div class="progress-modal-content elegant-progress-content"><!-- JS填充 --></div>
                <div class="progress-modal-actions elegant-progress-actions">
                    <button class="progress-modal-btn cancel elegant-progress-button"
                        id="progress-restore-cancel">取消</button>
                    <button class="progress-modal-btn confirm elegant-progress-button"
                        id="progress-restore-confirm">确定</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 启动脚本 -->
    <script type="module" src="./js/player_app.js"></script>
</body>

</html>
